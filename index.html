#bio-text{font-size:clamp(18px,2.4vw,38px);font-weight:500;line-height:1.38;letter-spacing:-.022em;color:#111}
#actions{position:absolute;bottom:40px;right:36px;display:flex;flex-direction:column;align-items:flex-end;gap:8px;pointer-events:all}
#clear-btn{width:44px;height:44px;min-width:44px;max-width:44px;min-height:44px;max-height:44px;flex-shrink:0;flex-grow:0;border:1.5px solid var(--muted);border-radius:0;background:transparent;cursor:none;display:flex;align-items:center;justify-content:center;position:relative;transition:background .3s,border-color .3s;outline:none;}
#clear-btn:hover{background:rgba(0,0,0,.05);outline:none;}
#clear-btn:focus{outline:none;}
#clear-btn:hover .tip{opacity:1;transform:translateY(-50%) translateX(-8px)}
#clear-btn .tip{color:var(--muted);}
#clear-btn.dirty{border-color:var(--gold);background:var(--gold);}
#clear-btn.dirty:hover{background:#b8901e;border-color:#b8901e;}
#clear-btn.dirty .tip{color:var(--gold)!important;}
#clear-btn .ec{fill:none;stroke:var(--muted);stroke-miterlimit:10;stroke-width:13px;transition:stroke .3s}
#clear-btn.dirty .ec{stroke:#fff}
@keyframes clearPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.13)}}
#clear-btn.dirty svg{animation:clearPulse 1.4s ease-in-out infinite}
.action-btn{width:44px;height:44px;border:1.5px solid #000;border-radius:0;display:flex;align-items:center;justify-content:center;cursor:none;background:transparent;position:relative;transition:background .2s,transform .15s;text-decoration:none}
.action-btn:hover{background:#000;transform:scale(1.04)}
.action-btn:hover svg{stroke:#fff}
.action-btn:hover .tip{opacity:1;transform:translateY(-50%) translateX(-8px)}
.action-btn svg{width:16px;height:16px;stroke:#000;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;transition:stroke .2s}
.tip{position:absolute;right:calc(100% + 12px);top:50%;transform:translateY(-50%) translateX(0);font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);white-space:nowrap;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none}
#draw-hint{position:fixed;top:45%;left:50%;transform:translate(-50%,-50%);z-index:3;text-align:center;pointer-events:none;transition:opacity .6s}
@media(max-width:680px){#draw-hint{top:42%}}
#draw-hint.gone{opacity:0}
#hint-main,#hint-main2,#hint-sub{font-size:clamp(11px,1.4vw,18px);font-weight:500;letter-spacing:.20em;text-transform:uppercase;color:rgba(0,0,0,.20);line-height:2;margin-bottom:0}
#hint-arrow{font-size:18px;color:rgba(0,0,0,.13);animation:arrowbob 1.8s ease-in-out infinite}
@keyframes arrowbob{0%,100%{transform:translateY(0)}50%{transform:translateY(5px)}}
#deck{position:fixed;inset:0;z-index:6;pointer-events:none}
.card{position:fixed;border-radius:0;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.18),0 1px 4px rgba(0,0,0,.08);will-change:transform,opacity;pointer-events:none}
.card-face{width:100%;height:100%;position:relative}
.card-tex{position:absolute;inset:0;pointer-events:none}
#pile-shadow{position:fixed;width:220px;height:12px;background:radial-gradient(ellipse,rgba(0,0,0,.12) 0%,transparent 70%);pointer-events:none;z-index:5;transform:translate(-50%,0);opacity:0;transition:opacity .5s}

/* MOBILE */
@media(max-width:680px){
  #cur{display:none}body{cursor:auto}
  #logo-area{top:22px;left:20px}#logo-img{width:53px;height:53px}
  #bio-area{left:20px;right:20px;width:auto;bottom:90px}
  #bio-text{font-size:clamp(15px,4.5vw,24px)}
  #actions{flex-direction:row;bottom:24px;left:20px;right:auto;gap:8px}
  .action-btn{width:36px;height:36px}
  #clear-btn{width:36px!important;height:36px!important;min-width:36px!important;max-width:36px!important;min-height:36px!important;max-height:36px!important}
  .tip{display:none}
}
</style>

};

/* ── CURSOR ── */
var curEl=document.getElementById('cur');
document.addEventListener('mousemove',function(e){curEl.style.left=e.clientX+'px';curEl.style.top=e.clientY+'px';},{passive:true});

/* ── CANVAS ── */
var canvas=document.getElementById('canvas');
var ctx=canvas.getContext('2d');
function resizeCanvas(){
  var tmp=document.createElement('canvas');tmp.width=canvas.width;tmp.height=canvas.height;
  tmp.getContext('2d').drawImage(canvas,0,0);
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;ctx.drawImage(tmp,0,0);
}
resizeCanvas();window.addEventListener('resize',resizeCanvas);
var isDrawing=false,lx=0,ly=0,hasDrawn=false,hasCards=false;
function updateDirty(){
  var btn=document.getElementById('clear-btn');
  if(hasDrawn||hasCards)btn.classList.add('dirty');
  else btn.classList.remove('dirty');
}
var drawHint=document.getElementById('draw-hint');
canvas.addEventListener('pointerdown',function(e){
  if(swipeActive)return;
  if(isMobile()&&hasCards)return;
  isDrawing=true;lx=e.clientX;ly=e.clientY;
  if(!hasDrawn){hasDrawn=true;drawHint.classList.add('gone');}
  updateDirty();
  e.preventDefault();
},{passive:false});
canvas.addEventListener('pointermove',function(e){
  if(!isDrawing)return;
  var x=e.clientX,y=e.clientY,speed=Math.hypot(x-lx,y-ly),p=e.pressure>0?e.pressure:1;
  ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(x,y);
  ctx.strokeStyle='rgba(12,12,12,'+Math.min(1,0.7+p*0.3)+')';
  ctx.lineWidth=Math.max(0.8,(1.2+p*1.6)-speed*0.022);
  ctx.lineCap=ctx.lineJoin='round';ctx.stroke();
  lx=x;ly=y;e.preventDefault();
},{passive:false});
['pointerup','pointerout','pointercancel'].forEach(function(ev){canvas.addEventListener(ev,function(){isDrawing=false;});});

/* ── HELPERS ── */
var seed=31;
function rnd(a,b){seed=(seed*1664525+1013904223)>>>0;return a+(seed/4294967296)*(b-a);}
function lerp(a,b,t){return a+(b-a)*t;}
function easeOut4(t){return 1-Math.pow(1-t,4);}
var CX=function(){return window.innerWidth*0.50;};
var CY=function(){
  if(isMobile()){
    var logoTop=22;
    var bioTop=window.innerHeight-90-80;
    return logoTop+(bioTop-logoTop)*0.5;
  }
  var logoTop=32;
  var bioTop=window.innerHeight-40-120;
  return logoTop+(bioTop-logoTop)*0.5;
};

/* ── DECK STATE ── */
var deck=document.getElementById('deck');
var pileShadow=document.getElementById('pile-shadow');
var activeSkill=null,cardEls=[],cardStates=[],dropTimers=[];
var isFanned=false,fanTimer=null;

/* ── MOBILE SWIPE STATE ── */
var swipeActive=false;
var swipeIdx=-1;      // which card is being swiped (topmost = last)
var swipeSX=0,swipeSY=0;   // touch start
var swipeDX=0,swipeDY=0;   // current delta
var SWIPE_THRESH=80;  // px to trigger dismiss

function isMobile(){return window.innerWidth<680;}

function makeCardEl(c,i){
  var el=document.createElement('div');el.className='card';
  el.style.width=c.w+'px';el.style.height=c.h+'px';
  el.style.opacity='0';el.style.zIndex=20+i;
  var face=document.createElement('div');face.className='card-face';
  if(c.img){
    face.style.background=c.bg;
    face.style.backgroundImage='url('+c.img+')';
    face.style.backgroundSize='cover';
    face.style.backgroundPosition='center';
  } else {
    face.style.background=c.bg;
  }
  var tex=document.createElement('div');tex.className='card-tex';
  if(!c.img)tex.style.background='repeating-linear-gradient('+(22+i*18)+'deg,transparent,transparent 34px,rgba(255,255,255,.02) 34px,rgba(255,255,255,.02) 35px)';
  face.appendChild(tex);el.appendChild(face);deck.appendChild(el);return el;
}

function dropCards(skill){
  dropTimers.forEach(clearTimeout);dropTimers=[];
  if(cardEls.length>0)flyOut(function(){startDrop(skill);});else startDrop(skill);
}

function clearAll(){
  pileShadow.style.opacity='0';
  if(cardEls.length===0)return;
  flyOut(function(){cardEls.forEach(function(el){el.remove();});cardEls=[];cardStates=[];isFanned=false;swipeActive=false;swipeIdx=-1;});
}

function startDrop(skill){
  cardEls.forEach(function(el){el.remove();});cardEls=[];cardStates=[];isFanned=false;swipeActive=false;swipeIdx=-1;
  var cards=ALL_CARDS[skill];
  var cx=CX(),cy=CY();
  seed=31;
  var pileRots=cards.map(function(){return rnd(-9,9);});
  var pileOffX=cards.map(function(){return rnd(-28,28);});
  var pileOffY=cards.map(function(){return rnd(-16,16);});
  var pileScale=isMobile()?1:1.3;
  var LAUNCHES=[
    function(c){return{sx:cx-c.w/2+rnd(-30,30),sy:-c.h-100,sr:rnd(-18,18)};},
    function(c){return{sx:window.innerWidth+60,sy:cy*0.3,sr:rnd(25,50)};},
    function(c){return{sx:-c.w-60,sy:cy*0.4,sr:rnd(-50,-25)};},
    function(c){return{sx:window.innerWidth*0.75,sy:-c.h-80,sr:rnd(10,35)};},
    function(c){return{sx:cx*0.25-c.w/2,sy:-c.h-80,sr:rnd(-35,-10)};},
    function(c){return{sx:window.innerWidth+60,sy:cy*1.2,sr:rnd(40,70)};},
    function(c){return{sx:-c.w-60,sy:cy*1.1,sr:rnd(-70,-40)};},
    function(c){return{sx:cx-c.w/2+rnd(80,160),sy:-c.h-120,sr:rnd(-10,25)};}
  ];
  cards.forEach(function(c,i){
    var el=makeCardEl(c,i);cardEls.push(el);
    var launch=LAUNCHES[i%LAUNCHES.length](c);
    var st={
      landed:false,dismissed:false,
      baseX:cx+pileOffX[i]-c.w/2,baseY:cy+pileOffY[i]-c.h/2,baseRot:pileRots[i],baseSc:pileScale,
      curX:launch.sx,curY:launch.sy,curRot:launch.sr,curOp:0,curScale:pileScale,targetScale:pileScale,
      dropping:false,dropT:0,
      startX:launch.sx,startY:launch.sy,startRot:launch.sr,
      targetX:cx+pileOffX[i]-c.w/2,targetY:cy+pileOffY[i]-c.h/2,targetRot:pileRots[i],
      flyout:false,fanX:0,fanY:0,fanRot:0
    };
    cardStates.push(st);
    var t=setTimeout(function(){
      st.dropping=true;st.dropT=0;
      st.curX=st.startX;st.curY=st.startY;st.curRot=st.startRot;st.curOp=0;
    },i*200);
    dropTimers.push(t);
  });
  var shadowT=setTimeout(function(){
    pileShadow.style.left=cx+'px';pileShadow.style.top=(cy+95)+'px';pileShadow.style.opacity='0.55';
    // show swipe hint on mobile after all cards landed
  },cards.length*200+400);
  dropTimers.push(shadowT);
}

function flyOut(cb){
  pileShadow.style.opacity='0';
  cardStates.forEach(function(st,i){
    st.dropping=false;st.flyout=true;
    st.targetX=-window.innerWidth-300;st.targetY=st.curY+rnd(-60,60);
    st.targetRot=st.curRot+(i%2===0?-35:35);
  });
  setTimeout(cb,600);
}

/* topmost non-dismissed card index */
function topCard(){
  for(var i=cardStates.length-1;i>=0;i--){
    if(!cardStates[i].dismissed&&!cardStates[i].flyout)return i;
  }
  return -1;
}

/* ── MOBILE SWIPE — listeners on document so deck pointer-events:none doesn't block ── */
document.addEventListener('touchstart',function(e){
  if(!isMobile()||!cardEls.length||swipeActive)return;
  var tx=e.touches[0].clientX,ty=e.touches[0].clientY;
  if(!isOverPile(tx,ty))return;
  var allLanded=cardStates.every(function(s){return s.landed||s.dismissed;});
  if(!allLanded)return;
  var idx=topCard();
  if(idx<0)return;
  swipeActive=true;swipeIdx=idx;
  swipeSX=tx;swipeSY=ty;
  swipeDX=0;swipeDY=0;
  e.preventDefault();
},{passive:false});

document.addEventListener('touchmove',function(e){
  if(!swipeActive)return;
  swipeDX=e.touches[0].clientX-swipeSX;
  swipeDY=e.touches[0].clientY-swipeSY;
  e.preventDefault();
},{passive:false});

document.addEventListener('touchend',function(e){
  if(!swipeActive)return;
  var dist=Math.hypot(swipeDX,swipeDY);
  var st=cardStates[swipeIdx];
  if(dist>SWIPE_THRESH){
    var angle=Math.atan2(swipeDY,swipeDX);
    var flyDist=Math.max(window.innerWidth,window.innerHeight)*1.5;
    st.targetX=st.curX+Math.cos(angle)*flyDist;
    st.targetY=st.curY+Math.sin(angle)*flyDist;
    st.targetRot=st.curRot+(swipeDX>0?35:-35);
    st.flyout=true;st.dismissed=true;
    var remaining=cardStates.filter(function(s){return !s.dismissed;}).length;
    if(remaining===0){
      setTimeout(function(){
        pileShadow.style.opacity='0';
        document.querySelectorAll('.skill-tag').forEach(function(t){t.classList.remove('active');});
        activeSkill=null;hasCards=false;updateDirty();
      },500);
    }
  } else {
    st.targetX=st.baseX;st.targetY=st.baseY;st.targetRot=st.baseRot;
  }
  swipeActive=false;swipeIdx=-1;swipeDX=0;swipeDY=0;
},{passive:false});

/* ── DESKTOP FAN (hover) ── */
function fanCards(){
  if(!cardEls.length||isFanned)return;isFanned=true;
  var W=window.innerWidth,H=window.innerHeight,n=cardEls.length;
  var cols=Math.ceil(Math.sqrt(n*(W/H))),rows=Math.ceil(n/cols);
  var cellW=(W-120)/cols,cellH=(H-160)/rows;
  cardStates.forEach(function(st,i){
    if(st.dismissed)return;
    var col=i%cols,row=Math.floor(i/cols);
    var c=ALL_CARDS[activeSkill][i];
    var scale=Math.min((cellW-28)/c.w,(cellH-28)/c.h,2.0);
    var fw=c.w*scale,fh=c.h*scale;
    st.fanX=60+col*cellW+(cellW-fw)/2;st.fanY=80+row*cellH+(cellH-fh)/2;
    st.fanRot=rnd(-1.5,1.5);
    st.targetX=st.fanX;st.targetY=st.fanY;st.targetRot=st.fanRot;st.targetScale=scale;
  });
  clearTimeout(fanTimer);fanTimer=setTimeout(refoldCards,5000);
}
function refoldCards(){
  if(!isFanned)return;isFanned=false;
  cardStates.forEach(function(st){if(!st.dismissed){st.targetX=st.baseX;st.targetY=st.baseY;st.targetRot=st.baseRot;st.targetScale=st.baseSc||1;}});
}
function pileX(){return window.innerWidth*0.50;}
function pileY(){return CY();}
function isOverPile(x,y){return Math.abs(x-pileX())<210&&Math.abs(y-pileY())<230;}
document.addEventListener('mousemove',function(e){
  if(!cardEls.length||isMobile())return;
  if(!cardStates.every(function(s){return s.landed||s.dismissed;}))return;
  if(isOverPile(e.clientX,e.clientY)){if(!isFanned)fanCards();}
  else{if(isFanned){clearTimeout(fanTimer);refoldCards();}}
},{passive:true});

/* ── SKILL TAGS ── */
document.querySelectorAll('.skill-tag').forEach(function(tag){
  tag.addEventListener('click',function(){
    var skill=tag.dataset.skill;
    if(activeSkill===skill){
      document.querySelectorAll('.skill-tag').forEach(function(t){t.classList.remove('active');});
      activeSkill=null;dropTimers.forEach(clearTimeout);dropTimers=[];clearAll();return;
    }
    document.querySelectorAll('.skill-tag').forEach(function(t){t.classList.remove('active');});
    tag.classList.add('active');activeSkill=skill;dropCards(skill);
    hasCards=true;updateDirty();
  });
});
document.getElementById('clear-btn').addEventListener('click',function(){
  ctx.clearRect(0,0,canvas.width,canvas.height);hasDrawn=false;hasCards=false;drawHint.classList.remove('gone');
  document.querySelectorAll('.skill-tag').forEach(function(t){t.classList.remove('active');});
  activeSkill=null;dropTimers.forEach(clearTimeout);dropTimers=[];clearAll();
  updateDirty();
});

/* ── MAIN LOOP ── */
var prev=performance.now();
(function loop(now){
  var dt=Math.min((now-prev)/16.67,3);prev=now;
  var spd=isFanned?0.13:0.09;
  cardStates.forEach(function(st,i){
    if(!cardEls[i])return;
    var el=cardEls[i];

    /* while dragging on mobile: follow finger directly */
    if(swipeActive&&i===swipeIdx){
      var cx2=st.baseX+c_w(i)/2,cy2=st.baseY+c_h(i)/2;
      var tx=st.baseX+swipeDX,ty=st.baseY+swipeDY;
      var dist=Math.hypot(swipeDX,swipeDY);
      var rot=st.baseRot+(swipeDX/8);
      var pullScale=1.06;
      el.style.opacity='1';
      el.style.zIndex=100;
      el.style.transform='translate('+tx+'px,'+ty+'px) rotate('+rot+'deg) scale('+pullScale+')';
      return;
    }
    if(el.style.zIndex==='100'&&!swipeActive)el.style.zIndex=20+i;

    if(st.dropping){
      st.dropT=Math.min(1,st.dropT+0.065*dt);var eas=easeOut4(st.dropT);
      st.curX=lerp(st.startX,st.targetX,eas);st.curY=lerp(st.startY,st.targetY,eas);
      st.curRot=lerp(st.startRot,st.targetRot,eas);st.curOp=Math.min(1,eas*3);
      st.curScale=lerp(st.curScale,st.baseSc||1,eas);
      if(st.dropT>=1){st.dropping=false;st.landed=true;st.targetScale=st.baseSc||1;}
    }else if(st.flyout){
      st.curX=lerp(st.curX,st.targetX,0.14*dt);st.curY=lerp(st.curY,st.targetY,0.12*dt);
      st.curRot=lerp(st.curRot,st.targetRot,0.10*dt);st.curOp=Math.max(0,st.curOp-0.08*dt);
      st.curScale=lerp(st.curScale,1,0.08*dt);
    }else{
      st.curX=lerp(st.curX,st.targetX,spd*dt);st.curY=lerp(st.curY,st.targetY,spd*dt);
      st.curRot=lerp(st.curRot,st.targetRot,spd*dt);st.curScale=lerp(st.curScale,st.targetScale,spd*dt);
    }
    el.style.opacity=st.curOp;
    el.style.transform='translate('+st.curX+'px,'+st.curY+'px) rotate('+st.curRot+'deg) scale('+st.curScale+')';
  });
  requestAnimationFrame(loop);
})(performance.now());

function c_w(i){return ALL_CARDS[activeSkill]?ALL_CARDS[activeSkill][i].w:200;}
function c_h(i){return ALL_CARDS[activeSkill]?ALL_CARDS[activeSkill][i].h:265;}
</script>
